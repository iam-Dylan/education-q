DATASET_TYPE: "mmlu-pro"
DATASET_NAME: "mmlu_pro_stratified.json"
OUTPUT_PATH: "../data/output/demo/"
EXPERIMENT_VERSION: "demo-1.0.0"
API_CALL_MAX_RETRIES: 3
API_CALL_RETRY_DELAY: 5
PARALLEL_TASKS: 1
NUM_INTERACTIONS: 2
NUM_IF_FEW_SHOTS: 2
SELECTED_CATEGORIES: []
SELECTED_QUESTION_ID: [10822]
FIRST_QUESTIONS_SIZE: null
QUESTIONS_SAMPLE_SIZE: null
GPQA_TEST_DATA_FOLDER_PATH: "../dataset/gpqa/dataset/"
GPQA_VAL_DATA_FILEPATH: "../dataset/gpqa/prompts/chain_of_thought_examples.json"
MMLU_PRO_TEST_DATA_FILEPATH: "../dataset/mmlu-pro-stratified/mmlu_pro_stratified.json"
AGIEVAL_TEST_DATA_FOLDER_PATH: "../dataset/AGIEval/data/v1_1/"
AGIEVAL_VAL_DATA_FILEPATH: "../dataset/AGIEval/data/few_shot_prompts.csv"
AGIEVAL_DATASET_NAMES: ["aqua-rat"]
LOGGING_LEVEL: "INFO"

# Demo config: replace api_key/base_url/model with your provider values.
# Run the main pipeline from src/run, for example:
#   python main.py --config ../../examples/demo_minimal.yaml --mode complete
#
# For OpenRouter-compatible execution, base_url is usually:
#   https://openrouter.ai/api/v1
TEACHER_CONFIGS:
  - name: "Teacher_demo"
    model: "openai/gpt-4o-mini"
    api_key: "REPLACE_WITH_API_KEY"
    base_url: "https://openrouter.ai/api/v1"
    temperature: 0.0
    max_tokens: 1024
    use_few_shot: false
    recommended_question_token_limit: 150
    recommended_education_theory: null
    max_tokens_rerun_threshold_percentage: 0.8
    question_retries: 3

STUDENT_CONFIGS:
  - name: "Student_demo"
    model: "openai/gpt-4o-mini"
    api_key: "REPLACE_WITH_API_KEY"
    base_url: "https://openrouter.ai/api/v1"
    temperature: 0.0
    answer_max_tokens: 1024
    test_max_tokens: 2048
    use_few_shot: false
    include_pretest_info: true
    recommended_answer_token_limit: 150
    recommended_test_token_limit: 1024
    max_tokens_rerun_threshold_percentage: 0.8
    answer_retries: 3

EVALUATOR_CONFIG:
  name: "Evaluator_demo"
  model: "openai/gpt-4o-mini"
  api_key: "REPLACE_WITH_API_KEY"
  base_url: "https://openrouter.ai/api/v1"
  temperature: 0.0
  max_tokens: 4096
  use_few_shot: false
